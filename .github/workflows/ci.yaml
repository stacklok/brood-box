name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GOPRIVATE: github.com/stacklok/*
  GH_TOKEN: ${{ secrets.GO_MODULE_TOKEN || github.token }}

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://${{ github.actor }}:${{ secrets.GO_MODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Build bbox-init (for go:embed)
        run: task build-init

      - name: Run tests
        run: task test

  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://${{ github.actor }}:${{ secrets.GO_MODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Install golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          install-only: true

      - name: Build bbox-init (for go:embed)
        run: task build-init

      - name: Run linter
        run: task lint

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://${{ github.actor }}:${{ secrets.GO_MODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Build
        run: task build

  integration-test:
    name: Integration Test (MCP)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Configure Git for private modules
        run: |
          git config --global url."https://${{ github.actor }}:${{ secrets.GO_MODULE_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Task
        uses: go-task/setup-task@v1

      - name: Build bbox-init (for go:embed)
        run: task build-init

      - name: Install ToolHive
        uses: StacklokLabs/toolhive-actions/install@v0

      - name: Run MCP server
        uses: StacklokLabs/toolhive-actions/run-mcp-server@v0
        with:
          server: fetch

      - name: Run integration tests
        run: go test -v -race -run Integration ./internal/infra/mcp/

  images:
    name: Build Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build images
        uses: docker/bake-action@v7
        with:
          files: docker-bake.hcl
