version: '3'

vars:
  BINARY_NAME: bbox
  IMAGE_REGISTRY: ghcr.io/stacklok/brood-box
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  PROPOLIS_VERSION:
    sh: go list -m github.com/stacklok/propolis | awk '{print $2}'
  HOST_ARCH:
    sh: uname -m
  HOST_ARCH_ALT:
    sh: |
      case $(uname -m) in
        x86_64)  echo amd64 ;;
        aarch64) echo arm64 ;;
        arm64)   echo aarch64 ;;
        amd64)   echo x86_64 ;;
        *)       uname -m ;;
      esac
  HOST_OS:
    sh: uname -s | tr '[:upper:]' '[:lower:]'
  HOST_OS_ALT:
    sh: uname -s | tr '[:upper:]' '[:lower:]' | sed 's/darwin/macos/'
  CONTAINER_ENGINE:
    sh: echo ${CONTAINER_ENGINE:-$(command -v docker >/dev/null 2>&1 && echo docker || echo podman)}
  LDFLAGS: >-
    -X github.com/stacklok/brood-box/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/brood-box/internal/version.Commit={{.COMMIT}}
  LDFLAGS_EMBED: >-
    -X github.com/stacklok/brood-box/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/brood-box/internal/version.Commit={{.COMMIT}}
    -X github.com/stacklok/brood-box/internal/infra/vm/runtimebin.Version={{.PROPOLIS_VERSION}}

env:
  GOTOOLCHAIN: auto

# Quick reference:
#   task build           → Build bbox (pure Go, no CGO)
#   task build-dev       → Build self-contained bbox with embedded propolis runtime
#   task fetch-runtime   → Download pre-built propolis runtime from GitHub Release
#   task fetch-firmware  → Download pre-built propolis firmware from GitHub Release
#   task test            → Run tests with race detector
#   task lint            → Run linter
#   task verify          → fmt + lint + test
#   task image-all       → Build all OCI guest images
#   task image-push      → Push all images to GHCR

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build-init:
    desc: Cross-compile bbox-init binary for guest VM
    # GOARCH inherits from host — KVM guests always match host architecture.
    # Override with GOARCH=<arch> task build-init if cross-compiling.
    env:
      CGO_ENABLED: "0"
      GOOS: linux
    cmds:
      - mkdir -p internal/infra/vm/initbin
      - go build -ldflags "-s -w" -o internal/infra/vm/initbin/bbox-init ./cmd/bbox-init
    sources:
      - cmd/bbox-init/**/*.go
      - internal/guest/**/*.go
    generates:
      - internal/infra/vm/initbin/bbox-init

  build:
    desc: Build self-contained bbox with embedded propolis runtime
    deps: [build-init, fetch-runtime]
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -tags embed_runtime -ldflags "{{.LDFLAGS_EMBED}}" -o bin/{{.BINARY_NAME}} ./cmd/bbox
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - bin/{{.BINARY_NAME}}

  build-dev:
    desc: Build self-contained bbox with embedded propolis runtime (alias)
    platforms: [linux]
    cmds:
      - task: build

  build-dev-darwin:
    desc: Build self-contained bbox with embedded propolis runtime (alias)
    platforms: [darwin]
    cmds:
      - task: build

  build-dev-system:
    desc: Build bbox + propolis-runner from system libkrun (requires libkrun-devel)
    platforms: [linux]
    cmds:
      - task: build
      - mkdir -p bin
      - CGO_ENABLED=1 go build -o bin/propolis-runner github.com/stacklok/propolis/runner/cmd/propolis-runner

  build-dev-system-darwin:
    desc: Build bbox + propolis-runner from system libkrun (macOS, requires Homebrew libkrun)
    platforms: [darwin]
    cmds:
      - task: build
      - mkdir -p bin
      - CGO_ENABLED=1 go build -o bin/propolis-runner github.com/stacklok/propolis/runner/cmd/propolis-runner
      - codesign --entitlements assets/entitlements.plist --force -s - bin/propolis-runner

  fetch-runtime:
    desc: Download pre-built propolis runtime from GitHub Release
    status:
      - test -f internal/infra/vm/runtimebin/propolis-runner
    cmds:
      - |
        mkdir -p internal/infra/vm/runtimebin
        gh release download {{.PROPOLIS_VERSION}} --repo stacklok/propolis --dir internal/infra/vm/runtimebin/ --clobber --pattern 'propolis-runtime-*.tar.gz'
        archive=""
        for os in "{{.HOST_OS}}" "{{.HOST_OS_ALT}}"; do
          for arch in "{{.HOST_ARCH}}" "{{.HOST_ARCH_ALT}}"; do
            candidate="internal/infra/vm/runtimebin/propolis-runtime-${os}-${arch}.tar.gz"
            if [ -f "$candidate" ]; then
              archive="$candidate"
              break 2
            fi
          done
        done
        if [ -z "$archive" ]; then
          echo "no runtime archive found in internal/infra/vm/runtimebin"
          ls -1 internal/infra/vm/runtimebin/propolis-runtime-*.tar.gz || true
          exit 1
        fi
        tar -xzf "$archive" -C internal/infra/vm/runtimebin/ --strip-components=1
        rm -f internal/infra/vm/runtimebin/propolis-runtime-*.tar.gz

  fetch-firmware:
    desc: Download pre-built propolis firmware from GitHub Release
    status:
      - ls internal/infra/vm/runtimebin/libkrunfw.* 1>/dev/null 2>&1
    cmds:
      - |
        mkdir -p internal/infra/vm/runtimebin
        gh release download {{.PROPOLIS_VERSION}} --repo stacklok/propolis --dir internal/infra/vm/runtimebin/ --clobber --pattern 'propolis-firmware-*.tar.gz'
        archive=""
        for os in "{{.HOST_OS}}" "{{.HOST_OS_ALT}}"; do
          for arch in "{{.HOST_ARCH}}" "{{.HOST_ARCH_ALT}}"; do
            candidate="internal/infra/vm/runtimebin/propolis-firmware-${os}-${arch}.tar.gz"
            if [ -f "$candidate" ]; then
              archive="$candidate"
              break 2
            fi
          done
        done
        if [ -z "$archive" ]; then
          echo "no firmware archive found in internal/infra/vm/runtimebin"
          ls -1 internal/infra/vm/runtimebin/propolis-firmware-*.tar.gz || true
          exit 1
        fi
        tar -xzf "$archive" -C internal/infra/vm/runtimebin/ --strip-components=1
        rm -f internal/infra/vm/runtimebin/propolis-firmware-*.tar.gz

  test:
    desc: Run unit tests
    cmds:
      - go test -v -race ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run --allow-parallel-runners ./...

  lint-fix:
    desc: Run linter and fix issues
    cmds:
      - golangci-lint run --allow-parallel-runners --fix ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...
      - goimports -w .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  verify:
    desc: Verify code (fmt, lint, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  install:
    desc: Install bbox to GOPATH/bin
    deps: [build-init, fetch-runtime]
    env:
      CGO_ENABLED: "0"
    cmds:
      - go install -tags embed_runtime -ldflags "{{.LDFLAGS_EMBED}}" ./cmd/bbox

  run:
    desc: Build and run bbox
    cmds:
      - task: build
      - bin/{{.BINARY_NAME}} {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
      - rm -f internal/infra/vm/initbin/bbox-init
      - rm -f internal/infra/vm/runtimebin/propolis-runner
      - rm -f internal/infra/vm/runtimebin/libkrun.so.1 internal/infra/vm/runtimebin/libkrun.1.dylib
      - rm -f internal/infra/vm/runtimebin/libkrunfw.so.5 internal/infra/vm/runtimebin/libkrunfw.5.dylib
      - rm -f internal/infra/vm/runtimebin/libepoxy.0.dylib internal/infra/vm/runtimebin/libvirglrenderer.1.dylib internal/infra/vm/runtimebin/libMoltenVK.dylib
      - rm -f internal/infra/vm/runtimebin/VERSION internal/infra/vm/runtimebin/LICENSE-GPL
      - rm -f internal/infra/vm/runtimebin/sha256sums.txt

  # --- OCI guest images ---

  image-base:
    desc: Build base guest image
    run: once
    cmds:
      - "{{.CONTAINER_ENGINE}} build -t {{.IMAGE_REGISTRY}}/base:latest images/base/"

  image-claude-code:
    desc: Build claude-code guest image
    deps: [image-base]
    cmds:
      - "{{.CONTAINER_ENGINE}} build -t {{.IMAGE_REGISTRY}}/claude-code:latest images/claude-code/"

  image-codex:
    desc: Build codex guest image
    deps: [image-base]
    cmds:
      - "{{.CONTAINER_ENGINE}} build -t {{.IMAGE_REGISTRY}}/codex:latest images/codex/"

  image-opencode:
    desc: Build opencode guest image
    deps: [image-base]
    cmds:
      - "{{.CONTAINER_ENGINE}} build -t {{.IMAGE_REGISTRY}}/opencode:latest images/opencode/"

  image-all:
    desc: Build all guest images
    deps: [image-claude-code, image-codex, image-opencode]

  image-push:
    desc: Push all images to GHCR
    deps: [image-all]
    cmds:
      - "{{.CONTAINER_ENGINE}} push {{.IMAGE_REGISTRY}}/base:latest"
      - "{{.CONTAINER_ENGINE}} push {{.IMAGE_REGISTRY}}/claude-code:latest"
      - "{{.CONTAINER_ENGINE}} push {{.IMAGE_REGISTRY}}/codex:latest"
      - "{{.CONTAINER_ENGINE}} push {{.IMAGE_REGISTRY}}/opencode:latest"
