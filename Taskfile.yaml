version: '3'

vars:
  BINARY_NAME: apiary
  IMAGE_REGISTRY: ghcr.io/stacklok/apiary
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  LDFLAGS: >-
    -X github.com/stacklok/apiary/internal/version.Version={{.VERSION}}
    -X github.com/stacklok/apiary/internal/version.Commit={{.COMMIT}}

# Quick reference:
#   task build         → Build apiary (pure Go, no CGO)
#   task build-dev     → Build apiary + propolis-runner
#   task test          → Run tests with race detector
#   task lint          → Run linter
#   task verify        → fmt + lint + test
#   task image-all     → Build all OCI guest images
#   task image-push    → Push all images to GHCR

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  build-init:
    desc: Cross-compile apiary-init binary for guest VM
    # GOARCH inherits from host — KVM guests always match host architecture.
    # Override with GOARCH=<arch> task build-init if cross-compiling.
    env:
      CGO_ENABLED: "0"
      GOOS: linux
    cmds:
      - mkdir -p internal/infra/vm/initbin
      - go build -ldflags "-s -w" -o internal/infra/vm/initbin/apiary-init ./cmd/apiary-init
    sources:
      - cmd/apiary-init/**/*.go
      - internal/guest/**/*.go
    generates:
      - internal/infra/vm/initbin/apiary-init

  build:
    desc: Build apiary binary (pure Go, no CGO)
    deps: [build-init]
    env:
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -ldflags "{{.LDFLAGS}}" -o bin/{{.BINARY_NAME}} ./cmd/apiary
    sources:
      - ./**/*.go
      - go.mod
      - go.sum
    generates:
      - bin/{{.BINARY_NAME}}

  build-dev:
    desc: Build apiary + propolis-runner (requires libkrun-devel)
    platforms: [linux]
    cmds:
      - task: build
      - mkdir -p bin
      - cd ../propolis && CGO_ENABLED=1 go build -o "$OLDPWD/bin/propolis-runner" ./runner/cmd/propolis-runner

  test:
    desc: Run unit tests
    cmds:
      - go test -v -race ./...

  test-coverage:
    desc: Run tests with coverage
    cmds:
      - go test -v -race -coverprofile=coverage.out ./...
      - go tool cover -html=coverage.out -o coverage.html
      - echo "Coverage report generated at coverage.html"

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run --allow-parallel-runners ./...

  lint-fix:
    desc: Run linter and fix issues
    cmds:
      - golangci-lint run --allow-parallel-runners --fix ./...

  fmt:
    desc: Format code
    cmds:
      - go fmt ./...
      - goimports -w .

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  verify:
    desc: Verify code (fmt, lint, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

  run:
    desc: Build and run apiary
    cmds:
      - task: build
      - bin/{{.BINARY_NAME}} {{.CLI_ARGS}}

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf bin/
      - rm -f coverage.out coverage.html
      - rm -f internal/infra/vm/initbin/apiary-init

  # --- OCI guest images ---

  image-base:
    desc: Build base guest image
    run: once
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/base:latest images/base/

  image-claude-code:
    desc: Build claude-code guest image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/claude-code:latest images/claude-code/

  image-codex:
    desc: Build codex guest image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/codex:latest images/codex/

  image-opencode:
    desc: Build opencode guest image
    deps: [image-base]
    cmds:
      - podman build -t {{.IMAGE_REGISTRY}}/opencode:latest images/opencode/

  image-all:
    desc: Build all guest images
    deps: [image-claude-code, image-codex, image-opencode]

  image-push:
    desc: Push all images to GHCR
    deps: [image-all]
    cmds:
      - podman push {{.IMAGE_REGISTRY}}/base:latest
      - podman push {{.IMAGE_REGISTRY}}/claude-code:latest
      - podman push {{.IMAGE_REGISTRY}}/codex:latest
      - podman push {{.IMAGE_REGISTRY}}/opencode:latest
